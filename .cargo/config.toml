# 基础构建配置 — 平台相关的 linker/ar/rustflags 由 setup_env.py 生成到 config.local.toml
# 运行: python3 loader/setup_env.py

[build]
target = "aarch64-linux-android"

[target.aarch64-linux-android]
# 以下字段由 setup_env.py 写入 config.local.toml
# linker = "..."
# ar = "..."
# rustflags = ["-C", "relocation-model=pic", "-C", "code-model=large", ...]

[env]
# 以下字段由 setup_env.py 写入 config.local.toml
# CC_aarch64-linux-android = "..."
# AR_aarch64-linux-android = "..."
# BINDGEN_EXTRA_CLANG_ARGS = "..."
